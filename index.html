<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e1117; --bg-card: #161b22; --bg-hover: #1c2333;
    --border: #30363d; --border-focus: #e0952b; --text: #e6edf3; --text-dim: #8b949e;
    --text-muted: #484f58; --accent: #e0952b; --accent-hover: #f0a840;
    --accent-glow: rgba(224,149,43,0.12); --radius: 8px; --radius-lg: 12px;
  }
  html { font-size: 15px; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; display: flex; flex-direction: column; }
  header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 0.7rem; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.75rem; color: #000; }
  .logo-text { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
  .header-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; max-width: 580px; width: 100%; }
  @media (max-width: 540px) { .card-grid { grid-template-columns: 1fr; max-width: 320px; } }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 2rem 1.5rem; text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; gap: 0.6rem;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 4px 24px var(--accent-glow); transform: translateY(-2px); }
  .card-icon { font-size: 1.8rem; line-height: 1; }
  .card-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
  .card-desc { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; }
  .card-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600; color: var(--accent); background: var(--accent-glow); padding: 0.15rem 0.5rem; border-radius: 4px; align-self: flex-start; margin-top: 0.3rem; }
  .card-tag.wip { color: var(--text-muted); background: rgba(72,79,88,0.15); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark" id="logoMark">P</div>
    <span class="logo-text">Production Hub</span>
  </div>
  <div class="header-meta" id="clock"></div>
</header>

<main>
  <div class="card-grid">
    <a href="tracker.html" class="card">
      <div class="card-icon">&#x1F4CB;</div>
      <div class="card-title">Issues Tracker</div>
      <div class="card-desc">Log production entries, track items, operations, and issues.</div>
      <div class="card-tag">ACTIVE</div>
    </a>
    <a href="improvement.html" class="card">
      <div class="card-icon">&#x1F527;</div>
      <div class="card-title">Improvement</div>
      <div class="card-desc">Track and manage improvement initiatives.</div>
      <div class="card-tag wip">COMING SOON</div>
    </a>
  </div>
</main>

<script>
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
updateClock(); setInterval(updateClock,1000);

var _eeClicks=0,_eeTimer=null;
document.getElementById('logoMark').addEventListener('click',function(){
  _eeClicks++;
  if(_eeTimer)clearTimeout(_eeTimer);
  _eeTimer=setTimeout(function(){_eeClicks=0;},1500);
  if(_eeClicks>=5){_eeClicks=0; clearTimeout(_eeTimer); window.location.href='arcade_games.html';}
});
</script>
</body>
</html>
