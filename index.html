<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e1117; --bg-card: #161b22; --bg-hover: #1c2333;
    --border: #30363d; --border-focus: #e0952b; --text: #e6edf3; --text-dim: #8b949e;
    --text-muted: #484f58; --accent: #e0952b; --accent-hover: #f0a840;
    --accent-glow: rgba(224,149,43,0.12); --radius: 8px; --radius-lg: 12px;
  }
  html { font-size: 15px; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; display: flex; flex-direction: column; }
  header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
  .logo { display: flex; align-items: center; gap: 0.7rem; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.75rem; color: #000; }
  .logo-text { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
  .nav-link { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--accent); text-decoration: none; padding: 0.3rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; }
  .nav-link:hover { background: var(--accent-glow); border-color: var(--accent); }
  .header-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; max-width: 580px; width: 100%; }
  @media (max-width: 540px) { .card-grid { grid-template-columns: 1fr; max-width: 320px; } }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 2rem 1.5rem; text-decoration: none; color: var(--text);
    display: flex; flex-direction: column; gap: 0.6rem;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 4px 24px var(--accent-glow); transform: translateY(-2px); }
  .card-icon { font-size: 1.8rem; line-height: 1; }
  .card-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
  .card-desc { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; }
  .card-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600; color: var(--accent); background: var(--accent-glow); padding: 0.15rem 0.5rem; border-radius: 4px; align-self: flex-start; margin-top: 0.3rem; }
  .card-tag.wip { color: var(--text-muted); background: rgba(72,79,88,0.15); }

  /* Bug Report */
  .bug-btn { position: fixed; bottom: 1.2rem; right: 1.2rem; z-index: 90; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); font-size: 1.1rem; cursor: pointer; display: grid; place-items: center; transition: all 0.15s; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .bug-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 2px 16px var(--accent-glow); }
  .bug-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(10,13,19,0.88); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .bug-overlay.open { opacity: 1; pointer-events: all; }
  .bug-modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 400px; max-width: 92vw; overflow: hidden; }
  .bug-modal-head { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .bug-modal-head h3 { font-size: 0.85rem; font-weight: 700; }
  .bug-modal-head button { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; padding: 0 0.3rem; }
  .bug-modal-head button:hover { color: var(--text); }
  .bug-modal-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .bug-modal-body label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); display: block; margin-bottom: 0.25rem; }
  .bug-modal-body textarea { width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.55rem 0.75rem; outline: none; resize: vertical; min-height: 70px; transition: border-color 0.15s; }
  .bug-modal-body textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
  .bug-modal-body textarea::placeholder { color: var(--text-muted); font-style: italic; }
  .bug-submit { width: 100%; padding: 0.55rem; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; color: #000; background: var(--accent); border: none; border-radius: var(--radius); cursor: pointer; transition: background 0.15s; }
  .bug-submit:hover { background: var(--accent-hover); }
  .bug-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .bug-toast { position: fixed; bottom: 4.5rem; right: 1.2rem; z-index: 110; background: var(--bg-card); border: 1px solid var(--green); border-radius: var(--radius); padding: 0.5rem 1rem; font-size: 0.78rem; color: var(--green); font-weight: 600; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .bug-toast.show { opacity: 1; transform: translateY(0); }
  .bug-toast.err { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-mark" id="logoMark">P</div><span class="logo-text">Production Hub</span></div>
  <div style="display:flex;align-items:center;gap:0.8rem;"><a href="tracker.html" class="nav-link">Tracker</a><a href="dashboard.html" class="nav-link">Dashboard</a><div class="header-meta" id="clock"></div></div>
</header>

<main>
  <div class="card-grid">
    <a href="tracker.html" class="card">
      <div class="card-icon">&#x1F4CB;</div>
      <div class="card-title">Issues Tracker</div>
      <div class="card-desc">Log production entries, track items, operations, and issues.</div>
      <div class="card-tag">ACTIVE</div>
    </a>
    <a href="improvement.html" class="card">
      <div class="card-icon">&#x1F527;</div>
      <div class="card-title">Improvement</div>
      <div class="card-desc">Submit and rate improvement ideas on a value/effort matrix.</div>
      <div class="card-tag">ACTIVE</div>
    </a>
  </div>
</main>

<button class="bug-btn" onclick="document.getElementById('bugOverlay').classList.add('open')" title="Report a Bug">&#x1F41B;</button>
<div class="bug-overlay" id="bugOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="bug-modal">
    <div class="bug-modal-head"><h3>Report a Bug</h3><button onclick="document.getElementById('bugOverlay').classList.remove('open')">&times;</button></div>
    <div class="bug-modal-body">
      <div><label>Description <span style="color:var(--accent)">*</span></label><textarea id="bugDesc" placeholder="What went wrong?" rows="3"></textarea></div>
      <div><label>Steps to Reproduce</label><textarea id="bugSteps" placeholder="1. Go to...&#10;2. Click on...&#10;3. See error" rows="3"></textarea></div>
      <button class="bug-submit" id="bugSubmit" onclick="submitBug()">Submit Report</button>
    </div>
  </div>
</div>
<div class="bug-toast" id="bugToast"></div>

<script>
var BUG_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzibPE1Lp5xP7-P83cjfiKd_-VTTRx5rdUxMnm5qD7REVgVw0r30EMfVMn_rlq2KNr5bg/exec';
function submitBug(){
  var desc=document.getElementById('bugDesc').value.trim();
  if(!desc){showBugToast('Please enter a description.','err');return;}
  var btn=document.getElementById('bugSubmit');btn.disabled=true;btn.textContent='Sending...';
  fetch(BUG_SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'bug_report',page:'Home',description:desc,steps:document.getElementById('bugSteps').value})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.success){document.getElementById('bugDesc').value='';document.getElementById('bugSteps').value='';document.getElementById('bugOverlay').classList.remove('open');showBugToast('Bug report sent!');}
    else{showBugToast(d.error||'Failed to send.','err');}
  })
  .catch(function(){showBugToast('Network error.','err');})
  .finally(function(){btn.disabled=false;btn.textContent='Submit Report';});
}
function showBugToast(msg,type){var t=document.getElementById('bugToast');t.textContent=msg;t.className='bug-toast show'+(type?' '+type:'');setTimeout(function(){t.className='bug-toast';},3000);}

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
updateClock(); setInterval(updateClock,1000);

var _eeClicks=0,_eeTimer=null;
document.getElementById('logoMark').addEventListener('click',function(){
  _eeClicks++;
  if(_eeTimer)clearTimeout(_eeTimer);
  _eeTimer=setTimeout(function(){_eeClicks=0;},1500);
  if(_eeClicks>=5){_eeClicks=0; clearTimeout(_eeTimer); window.location.href='arcade_games.html';}
});
</script>
</body>
</html>
