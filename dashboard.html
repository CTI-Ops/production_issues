<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Production Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e1117; --bg-card: #161b22; --bg-input: #0d1117; --bg-hover: #1c2333;
    --border: #30363d; --border-focus: #e0952b; --text: #e6edf3; --text-dim: #8b949e;
    --text-muted: #484f58; --accent: #e0952b; --accent-hover: #f0a840;
    --accent-glow: rgba(224,149,43,0.12); --green: #3fb950; --green-bg: rgba(63,185,80,0.08);
    --red: #f85149; --red-bg: rgba(248,81,73,0.08); --radius: 8px; --radius-lg: 12px;
  }
  html { font-size: 15px; overflow-x: hidden; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; overflow-x: hidden; }
  header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
  .logo { display: flex; align-items: center; gap: 0.7rem; }
  .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.75rem; color: #000; }
  .logo-text { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
  .header-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted); }
  .nav-link { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--accent); text-decoration: none; padding: 0.3rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; }
  .nav-link:hover { background: var(--accent-glow); border-color: var(--accent); }
  main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .section-head { padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.6rem; border-bottom: 1px solid var(--border); }
  .section-num { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; font-weight: 600; color: var(--accent); background: var(--accent-glow); padding: 0.12rem 0.45rem; border-radius: 4px; letter-spacing: 0.04em; }
  .section-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }

  /* KPI Cards */
  .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 0.75rem; }
  .kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.8rem 1rem; display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
  .kpi-val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .kpi-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .kpi-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-dim); }
  .kpi.accent .kpi-val { color: var(--accent); }
  .kpi.green .kpi-val { color: var(--green); }
  .kpi.red .kpi-val { color: var(--red); }

  /* Detail panels */
  .dash-detail { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 0.75rem; overflow: hidden; }
  .dash-bar-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 1rem; font-size: 0.75rem; }
  .dash-bar-label { flex-shrink: 0; width: 120px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-bar-track { flex: 1; height: 6px; background: var(--bg-input); border-radius: 3px; overflow: hidden; }
  .dash-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .dash-bar-fill.accent { background: var(--accent); }
  .dash-bar-fill.green { background: var(--green); }
  .dash-bar-fill.red { background: var(--red); }
  .dash-bar-val { flex-shrink: 0; width: 50px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); }

  /* Combo table */
  .combo-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 1rem; border-bottom: 1px solid rgba(48,54,61,0.3); font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
  .combo-row:last-child { border-bottom: none; }
  .combo-label { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .combo-stat { flex-shrink: 0; text-align: right; color: var(--text-muted); font-size: 0.68rem; min-width: 50px; }
  .combo-count { flex-shrink: 0; text-align: right; color: var(--red); font-weight: 600; min-width: 30px; font-size: 0.75rem; }

  /* Trend chart */
  .trend-chart { padding: 0.8rem 1rem; }
  .trend-bars { display: flex; align-items: flex-end; gap: 2px; height: 80px; }
  .trend-bar { flex: 1; min-width: 8px; background: var(--accent); border-radius: 2px 2px 0 0; transition: height 0.4s ease; position: relative; cursor: default; }
  .trend-bar:hover { background: var(--accent-hover); }
  .trend-bar:hover .trend-tip { display: block; }
  .trend-tip { display: none; position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 0.25rem 0.4rem; font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--text-dim); white-space: nowrap; z-index: 10; pointer-events: none; }
  .trend-labels { display: flex; justify-content: space-between; margin-top: 0.3rem; font-family: 'JetBrains Mono', monospace; font-size: 0.58rem; color: var(--text-muted); }

  /* Recent entries table */
  .log-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .log-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
  .log-table th { text-align: left; padding: 0.4rem 0.5rem; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .log-table td { padding: 0.35rem 0.5rem; border-bottom: 1px solid rgba(48,54,61,0.4); color: var(--text-dim); }

  /* Loading / refresh */
  .dash-status { text-align: center; padding: 0.5rem; font-size: 0.72rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .btn-refresh { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; color: var(--text-dim); background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.7rem; cursor: pointer; transition: all 0.15s; }
  .btn-refresh:hover { background: var(--bg-hover); color: var(--text); }

  @media (max-width: 540px) {
    .dash { grid-template-columns: 1fr; }
    header { padding: 0.9rem 1rem; }
    main { padding: 1rem 0.6rem 4rem; }
    .dash-bar-label { width: 90px; }
    .combo-row { font-size: 0.68rem; }
    .trend-bars { height: 60px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-mark">PL</div><div class="logo-text">Dashboard</div></div>
  <div style="display:flex;align-items:center;gap:0.8rem;"><a href="index.html" class="nav-link">Log Entry</a><div class="header-meta" id="clock"></div></div>
</header>
<main>
  <div class="dash-status" id="dashStatus">Loading...</div>

  <!-- KPI Row 1: Top Offender, Time Lost, Repeat Issues -->
  <div class="dash" id="dashKpis" style="display:none;">
    <div class="kpi red"><div class="kpi-val" id="kpiTopOffender">&mdash;</div><div class="kpi-label">Top Offender</div><div class="kpi-sub" id="kpiTopOffenderSub">&mdash;</div></div>
    <div class="kpi accent"><div class="kpi-val" id="kpiTimeLost">&mdash;</div><div class="kpi-label">Time Lost</div><div class="kpi-sub" id="kpiTimeLostSub">&mdash;</div></div>
    <div class="kpi green"><div class="kpi-val" id="kpiRepeat">&mdash;</div><div class="kpi-label">Repeat Issues</div><div class="kpi-sub" id="kpiRepeatSub">&mdash;</div></div>
  </div>

  <!-- KPI Row 2: Entries, Total Parts, Avg Time/Part -->
  <div class="dash" id="dashKpis2" style="display:none;">
    <div class="kpi"><div class="kpi-val" id="kpiEntries">&mdash;</div><div class="kpi-label">Entries</div><div class="kpi-sub" id="kpiEntriesSub">&mdash;</div></div>
    <div class="kpi"><div class="kpi-val" id="kpiParts">&mdash;</div><div class="kpi-label">Total Parts</div><div class="kpi-sub" id="kpiPartsAvg">&mdash;</div></div>
    <div class="kpi"><div class="kpi-val" id="kpiAvgTime">&mdash;</div><div class="kpi-label">Avg Time/Part</div><div class="kpi-sub" id="kpiAvgTimeSub">&mdash;</div></div>
  </div>

  <!-- Chart 1: Issues by Item (with time context) -->
  <div class="dash-detail" id="dashIssues" style="display:none;">
    <div class="section-head"><span class="section-num">01</span><span class="section-label">Quantity by Issue</span></div>
    <div id="dashIssuesBars"></div>
  </div>

  <!-- Chart 2: Parts by Item -->
  <div class="dash-detail" id="dashItems" style="display:none;">
    <div class="section-head"><span class="section-num">02</span><span class="section-label">Parts by Item</span></div>
    <div id="dashItemsBars"></div>
  </div>

  <!-- Chart 3: Recurring Item + Issue Combos -->
  <div class="dash-detail" id="dashCombos" style="display:none;">
    <div class="section-head"><span class="section-num">03</span><span class="section-label">Recurring Item + Issue Combos</span></div>
    <div id="dashCombosList"></div>
  </div>

  <!-- Chart 4: Weekly Issue Trend -->
  <div class="dash-detail" id="dashTrend" style="display:none;">
    <div class="section-head"><span class="section-num">04</span><span class="section-label">Weekly Issue Trend</span></div>
    <div class="trend-chart" id="dashTrendChart"></div>
  </div>

  <!-- Recent Entries -->
  <div class="dash-detail" id="dashRecent" style="display:none;">
    <div class="section-head"><span class="section-num">05</span><span class="section-label">Recent Entries</span></div>
    <div style="padding:0.5rem;">
      <div class="log-table-wrap">
        <table class="log-table">
          <thead><tr><th>#</th><th>Item</th><th>Op</th><th>Time</th><th>Qty</th><th>Issues</th></tr></thead>
          <tbody id="recentBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div style="text-align:center;margin-top:1rem;">
    <button class="btn-refresh" onclick="loadDashboard()">Refresh</button>
  </div>
</main>

<script>
const DEFAULT_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwgdo4VD3svgidlA3bJuZyP5UCwtZSvmNNDdTCEsVmHXGp_-kcki9VCGDGtvOyDnWPEVg/exec';
const storedUrl=localStorage.getItem('prodlog_script_url');
if(storedUrl && storedUrl!==DEFAULT_SCRIPT_URL){localStorage.removeItem('prodlog_script_url');}
const SCRIPT_URL=DEFAULT_SCRIPT_URL;

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}

async function fetchRetry(url,opts,retries=3,delay=1500,onRetry){
  for(let i=0;i<=retries;i++){
    try{const r=await fetch(url,opts); if(!r.ok&&i<retries){if(onRetry)onRetry(i+2,retries+1); await new Promise(w=>setTimeout(w,delay*(i+1)));continue;} return r;}
    catch(e){if(i>=retries)throw e; if(onRetry)onRetry(i+2,retries+1); await new Promise(w=>setTimeout(w,delay*(i+1)));}
  }
}

async function loadDashboard(){
  const status=document.getElementById('dashStatus');
  status.textContent='Loading...'; status.style.display='block';
  if(!SCRIPT_URL){status.textContent='No script URL configured. Go to Log Entry to set up.'; return;}
  try{
    const url=SCRIPT_URL+(SCRIPT_URL.includes('?')?'&':'?')+'action=dashboard';
    const res=await fetchRetry(url,undefined,3,1500,(attempt,total)=>{status.textContent='Connection issue \u2014 retrying (attempt '+attempt+'/'+total+')...';});
    const d=await res.json();
    if(d.error) throw new Error(d.error);
    renderDashboard(d);
    status.style.display='none';
  }catch(e){
    status.textContent='Error: '+(e.message||'Could not load dashboard data. Check Apps Script deployment.');
  }
}

function renderDashboard(d){
  const n=d.total_entries||0;
  const totalParts=d.total_parts||0;
  const totalTime=d.total_time_min||0;
  const issueCounts=d.issues_breakdown||{};
  const itemCounts=d.items_breakdown||{};
  const itemTimeCounts=d.item_time_breakdown||{};
  const topOffender=d.top_offender||{};
  const recurringCombos=d.recurring_combos||[];
  const weeklyTrend=d.weekly_trend||[];
  const recentEntries=d.recent_entries||[];
  const period=d.period||'all time';

  // === KPI Row 1 ===
  document.getElementById('dashKpis').style.display='grid';

  // Top Offender
  document.getElementById('kpiTopOffender').textContent=topOffender.item||'\u2014';
  document.getElementById('kpiTopOffenderSub').textContent=topOffender.item?(topOffender.count+' parts logged'):'no data';

  // Time Lost
  var hrs=totalTime>=60?Math.floor(totalTime/60)+'h '+totalTime%60+'m':totalTime+'m';
  document.getElementById('kpiTimeLost').textContent=hrs;
  document.getElementById('kpiTimeLostSub').textContent=n>0?(totalTime/n).toFixed(0)+' min avg/entry':'no data';

  // Repeat Issues (combos with 2+ occurrences)
  var repeatCount=recurringCombos.length;
  document.getElementById('kpiRepeat').textContent=repeatCount;
  var repeatTotal=recurringCombos.reduce(function(s,c){return s+c.count;},0);
  document.getElementById('kpiRepeatSub').textContent=repeatCount>0?(repeatTotal+' total occurrences'):'no recurring combos';

  // === KPI Row 2 ===
  document.getElementById('dashKpis2').style.display='grid';
  document.getElementById('kpiEntries').textContent=n;
  document.getElementById('kpiEntriesSub').textContent=period;
  document.getElementById('kpiParts').textContent=totalParts;
  document.getElementById('kpiPartsAvg').textContent=n>0?(totalParts/n).toFixed(0)+' avg/entry':'\u2014';
  var avgTpp=totalParts>0?(totalTime/totalParts):0;
  document.getElementById('kpiAvgTime').textContent=totalParts>0?avgTpp.toFixed(2)+'m':'\u2014';
  document.getElementById('kpiAvgTimeSub').textContent=totalParts>0?(totalTime+'m across '+totalParts+' parts'):'\u2014';

  // === Chart 1: Issues by Quantity ===
  renderBars('dashIssues','dashIssuesBars',issueCounts,'red');

  // === Chart 2: Parts by Item (with time annotation) ===
  renderItemBars('dashItems','dashItemsBars',itemCounts,itemTimeCounts);

  // === Chart 3: Recurring Combos ===
  renderCombos(recurringCombos);

  // === Chart 4: Weekly Trend ===
  renderTrend(weeklyTrend);

  // === Recent Entries ===
  if(recentEntries.length){
    document.getElementById('dashRecent').style.display='block';
    var tbody=document.getElementById('recentBody');
    tbody.innerHTML=recentEntries.map(function(e,i){
      var issues=(e.issues||'None').replace(/;/g,', ');
      return '<tr><td>'+(i+1)+'</td><td>'+esc(e.item||'')+'</td><td style="font-size:0.68rem">'+esc(e.operation||'')+'</td><td>'+(e.task_time_min||'?')+'m</td><td>'+(e.quantity||'')+'</td><td style="font-size:0.68rem">'+esc(issues)+'</td></tr>';
    }).join('');
  } else { document.getElementById('dashRecent').style.display='none'; }
}

function renderBars(panelId,barsId,counts,colorClass){
  var keys=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
  var panel=document.getElementById(panelId);
  var container=document.getElementById(barsId);
  if(keys.length){
    panel.style.display='block';
    var max=counts[keys[0]]||1;
    container.innerHTML=keys.map(function(k){
      return '<div class="dash-bar-row"><span class="dash-bar-label" title="'+esc(k)+'">'+esc(k)+'</span><div class="dash-bar-track"><div class="dash-bar-fill '+colorClass+'" style="width:'+Math.round((counts[k]/max)*100)+'%"></div></div><span class="dash-bar-val">'+counts[k]+'</span></div>';
    }).join('');
  } else { panel.style.display='none'; }
}

function renderItemBars(panelId,barsId,counts,timeCounts){
  var keys=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
  var panel=document.getElementById(panelId);
  var container=document.getElementById(barsId);
  if(keys.length){
    panel.style.display='block';
    var max=counts[keys[0]]||1;
    container.innerHTML=keys.map(function(k){
      var timeStr=timeCounts[k]?(timeCounts[k]+'m'):'';
      return '<div class="dash-bar-row"><span class="dash-bar-label" title="'+esc(k)+'">'+esc(k)+'</span><div class="dash-bar-track"><div class="dash-bar-fill accent" style="width:'+Math.round((counts[k]/max)*100)+'%"></div></div><span class="dash-bar-val">'+counts[k]+(timeStr?' <span style="color:var(--text-muted);font-size:0.6rem">'+timeStr+'</span>':'')+'</span></div>';
    }).join('');
  } else { panel.style.display='none'; }
}

function renderCombos(combos){
  var panel=document.getElementById('dashCombos');
  var container=document.getElementById('dashCombosList');
  if(combos.length){
    panel.style.display='block';
    container.innerHTML=combos.map(function(c){
      return '<div class="combo-row"><span class="combo-label" title="'+esc(c.combo)+'">'+esc(c.combo)+'</span><span class="combo-stat">'+c.totalTime+'m</span><span class="combo-count">'+c.count+'x</span></div>';
    }).join('');
  } else { panel.style.display='none'; }
}

function renderTrend(weeks){
  var panel=document.getElementById('dashTrend');
  var container=document.getElementById('dashTrendChart');
  if(weeks.length<2){ panel.style.display='none'; return; }
  panel.style.display='block';
  var maxCount=Math.max.apply(null,weeks.map(function(w){return w.count;}));
  if(maxCount===0) maxCount=1;

  var barsHtml='<div class="trend-bars">';
  weeks.forEach(function(w){
    var pct=Math.max(2,Math.round((w.count/maxCount)*100));
    barsHtml+='<div class="trend-bar" style="height:'+pct+'%"><div class="trend-tip">'+esc(w.week)+'<br>'+w.count+' issues, '+w.totalTime+'m</div></div>';
  });
  barsHtml+='</div>';

  var labelsHtml='<div class="trend-labels"><span>'+esc(weeks[0].week)+'</span><span>'+esc(weeks[weeks.length-1].week)+'</span></div>';
  container.innerHTML=barsHtml+labelsHtml;
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

updateClock(); setInterval(updateClock,1000);
loadDashboard();
</script>
</body>
</html>
